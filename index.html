  <style>
    /* =============================================
       CSS RESET + BASE
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #0969da;
      --blue-light: #dbeafe;
      --blue-muted: #54aeff;
      --text: #24292f;
      --text-muted: #656d76;
      --bg: #ffffff;
      --bg-alt: #f6f8fa;
      --border: #d0d7de;
      --border-muted: #e8eaed;
      --sidebar-w: 252px;
      --header-h: 60px;
      --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --radius: 6px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
      --shadow: 0 3px 10px rgba(0,0,0,.10);
      --bg-hover: #eef6ff;
      --blue-border: #bee3f8;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
    }

    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* =============================================
       LAYOUT
    ============================================= */
    #app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }

    .header-left { display: flex; align-items: center; gap: 12px; }

    .site-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .site-subtitle {
      font-size: 13px;
      color: var(--text-muted);
    }

    .header-meta {
      font-size: 12px;
      color: var(--text-muted);
    }

    .header-right { display: flex; align-items: center; gap: 12px; }

    .btn-login {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      font-family: var(--font);
      color: var(--bg);
      background: var(--text);
      border: 1px solid var(--text);
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-login:hover { background: #444c56; border-color: #444c56; text-decoration: none; }

    .btn-login svg { flex-shrink: 0; }

    #layout {
      display: flex;
      min-height: calc(100vh - var(--header-h));
    }

    /* =============================================
       SIDEBAR
    ============================================= */
    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      position: sticky;
      top: var(--header-h);
      height: calc(100vh - var(--header-h));
      overflow-y: auto;
      padding: 20px 0;
      border-right: 1px solid var(--border);
      background: var(--bg-alt);
    }

    .sidebar-heading {
      padding: 0 16px 8px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    .toc-list { list-style: none; }

    .toc-item a {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      font-size: 13px;
      color: var(--text);
      border-left: 3px solid transparent;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
    }

    .toc-item a:hover {
      background: var(--blue-light);
      color: var(--blue);
      text-decoration: none;
      border-left-color: var(--blue);
    }

    .toc-item a.active {
      background: var(--blue-light);
      color: var(--blue);
      border-left-color: var(--blue);
      font-weight: 600;
    }

    .toc-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      font-size: 10px;
      font-weight: 700;
      border-radius: 50%;
      background: var(--border);
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .toc-item a.active .toc-num,
    .toc-item a:hover .toc-num {
      background: var(--blue);
      color: white;
    }

    /* =============================================
       MAIN CONTENT
    ============================================= */
    #main {
      flex: 1;
      min-width: 0;
      padding: 32px 40px 64px;
      max-width: 900px;
    }

    /* =============================================
       MOBILE NAV
    ============================================= */
    #mobile-nav {
      display: none;
      padding: 12px 16px;
      background: var(--bg-alt);
      border-bottom: 1px solid var(--border);
    }

    #mobile-nav-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      display: block;
      margin-bottom: 6px;
    }

    #mobile-nav select {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      font-family: var(--font);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
    }

    /* =============================================
       SECTIONS
    ============================================= */
    .stack-section {
      margin-bottom: 48px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border-muted);
    }

    .section-order {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      font-size: 12px;
      font-weight: 700;
      border-radius: 50%;
      background: var(--blue);
      color: white;
      flex-shrink: 0;
    }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      border-left: 4px solid var(--blue);
      padding-left: 12px;
    }

    /* =============================================
       ENTRY TABLE
    ============================================= */
    .entries-table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .entries-table thead th {
      padding: 8px 14px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      background: var(--bg-alt);
      border-bottom: 1px solid var(--border);
      text-align: left;
    }

    .entry-row:nth-child(odd) { background: var(--bg); }
    .entry-row:nth-child(even) { background: var(--bg-alt); }
    .entry-row:hover { background: var(--bg-hover); }

    .entry-row td {
      padding: 10px 14px;
      vertical-align: top;
      border-bottom: 1px solid var(--border-muted);
    }

    .entry-row:last-child td { border-bottom: none; }

    .entry-name {
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }

    .entry-version {
      font-size: 12px;
      color: var(--text-muted);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      margin-top: 2px;
    }

    .links-cell { min-width: 140px; }

    .link-badges { display: flex; flex-wrap: wrap; gap: 4px; }

    .link-badge {
      display: inline-block;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 500;
      color: var(--blue);
      background: var(--blue-light);
      border: 1px solid var(--blue-border);
      border-radius: 20px;
      text-decoration: none;
      transition: background 0.1s, color 0.1s;
      white-space: nowrap;
    }
    .link-badge:hover {
      background: var(--blue);
      color: white;
      border-color: var(--blue);
      text-decoration: none;
    }

    .notes-cell { min-width: 200px; }

    .sub-entries {
      margin: 10px 0 0 0;
      padding: 0;
      list-style: none;
      border-top: 1px solid var(--border-muted);
    }
    .sub-entry {
      padding: 6px 0 6px 12px;
      border-bottom: 1px solid var(--border-muted);
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      gap: 8px;
      align-items: baseline;
    }
    .sub-entry:last-child { border-bottom: none; }
    .sub-entry-name {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }
    .sub-entry-notes { flex: 1; }

    .notes-details summary {
      cursor: pointer;
      font-size: 12px;
      color: var(--text-muted);
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .notes-details summary::-webkit-details-marker { display: none; }

    .notes-details summary::before {
      content: "▶";
      font-size: 9px;
      transition: transform 0.15s;
      color: var(--text-muted);
    }

    .notes-details[open] summary::before { transform: rotate(90deg); }

    .notes-details[open] summary { color: var(--text); margin-bottom: 6px; }

    .notes-content {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg-alt);
      border: 1px solid var(--border-muted);
      border-radius: var(--radius);
      padding: 8px 10px;
      margin-top: 4px;
    }

    .notes-content code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 11px;
      background: var(--border-muted);
      padding: 1px 4px;
      border-radius: 3px;
      color: var(--text);
    }

    /* =============================================
       EDIT CONTROLS
    ============================================= */
    .edit-controls {
      display: none; /* shown only when authenticated */
      gap: 6px;
      align-items: center;
    }

    .btn-edit, .btn-delete {
      padding: 3px 10px;
      font-size: 12px;
      font-family: var(--font);
      border-radius: 6px;
      border: 1px solid var(--border);
      cursor: pointer;
      font-weight: 500;
      line-height: 1.5;
    }
    .btn-edit {
      background: var(--bg-alt);
      color: var(--text);
    }
    .btn-edit:hover { background: var(--blue-light); color: var(--blue); border-color: var(--blue-border); }
    .btn-delete {
      background: var(--bg-alt);
      color: #cf222e;
      border-color: #ffcdd2;
    }
    .btn-delete:hover { background: #fff0f0; border-color: #cf222e; }

    /* =============================================
       FOOTER
    ============================================= */
    #app-footer {
      margin-top: 64px;
      padding: 20px 40px;
      border-top: 1px solid var(--border);
      background: var(--bg-alt);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      gap: 12px;
      flex-wrap: wrap;
    }

    #app-footer a { color: var(--text-muted); }
    #app-footer a:hover { color: var(--blue); }

    /* =============================================
       RESPONSIVE
    ============================================= */
    @media (max-width: 768px) {
      #sidebar { display: none; }
      #mobile-nav { display: block; }

      #main { padding: 20px 16px 48px; }

      #app-header { padding: 0 16px; }
      .site-subtitle { display: none; }

      .entries-table { font-size: 13px; }

      #app-footer { padding: 16px; }
    }
  </style>
</head>

<script>
const SUPABASE_URL = 'https://oqqsblfwaedicryxocml.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xcXNibGZ3YWVkaWNyeXhvY21sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2Njg5NzgsImV4cCI6MjA5MzI0NDk3OH0.AfZGPIcrcG3bM3E0d4YT6v66LKtlTEpgleP-HPoJvjI';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function escHtmlAuth(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

async function handleLoginClick() {
  const { error } = await supabase.auth.signInWithOAuth({
    provider: 'github',
    options: {
      scopes: 'public_repo',
      redirectTo: window.location.href
    }
  });
  if (error) alert('Login error: ' + error.message);
}

async function handleLogoutClick() {
  await supabase.auth.signOut();
  updateAuthUI(null);
}

function updateAuthUI(session) {
  const loginBtn = document.getElementById('login-btn');
  const userInfo = document.getElementById('user-info');

  if (session) {
    // Store provider_token (GitHub token) for later use by commit logic
    window._githubToken = session.provider_token;

    const user = session.user;
    const name = user.user_metadata?.user_name || user.email;
    const avatar = user.user_metadata?.avatar_url;

    loginBtn.style.display = 'none';
    if (userInfo) {
      userInfo.innerHTML =
        (avatar ? `<img src="${escHtmlAuth(avatar)}" style="width:28px;height:28px;border-radius:50%;margin-right:8px;vertical-align:middle">` : '') +
        `<span style="margin-right:12px;font-size:14px">${escHtmlAuth(name)}</span>` +
        `<button onclick="handleLogoutClick()" style="font-size:13px;padding:4px 10px;border:1px solid #d0d7de;border-radius:6px;background:#f6f8fa;cursor:pointer">Sign out</button>`;
      userInfo.style.display = 'flex';
      userInfo.style.alignItems = 'center';
    }
    // Show edit buttons
    document.querySelectorAll('.edit-controls').forEach(el => el.style.display = 'flex');
  } else {
    window._githubToken = null;
    loginBtn.style.display = '';
    if (userInfo) {
      userInfo.innerHTML = '';
      userInfo.style.display = 'none';
    }
    // Hide edit buttons
    document.querySelectorAll('.edit-controls').forEach(el => el.style.display = 'none');
  }
}

async function initAuth() {
  // Handle OAuth callback (Supabase puts session in URL hash)
  const { data: { session } } = await supabase.auth.getSession();
  updateAuthUI(session);

  // Also listen for auth state changes
  supabase.auth.onAuthStateChange((_event, session) => {
    updateAuthUI(session);
  });
}
</script>

<script>
(function () {
  'use strict';

  /* ---------- Parse data ---------- */
  const raw = document.getElementById('stack-data').textContent;
  let data;
  try {
    data = JSON.parse(raw);
  } catch (e) {
    document.getElementById('main').innerHTML =
      '<p style="color:red;padding:2rem;font-family:monospace">JSON parse error: ' + escHtml(e.message) + '</p>';
    return;
  }
  const { sections, meta } = data;

  /* ---------- Header + Footer dates ---------- */
  document.getElementById('header-date').textContent = 'Updated: ' + meta.lastUpdated;
  document.getElementById('footer-meta').textContent =
    'Last updated: ' + meta.lastUpdated + ' · Maintained by ' + meta.owner;

  /* ---------- Helpers ---------- */
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderLinks(links) {
    if (!links || links.length === 0) return '<span style="color:var(--text-muted);font-size:12px;">—</span>';
    return '<div class="link-badges">' +
      links.map(l =>
        // SECURITY: When editing is added, validate l.url starts with https:// or http://
        // to prevent javascript: URI injection.
        `<a class="link-badge" href="${escHtml(l.url)}" target="_blank" rel="noopener">${escHtml(l.label)}</a>`
      ).join('') +
      '</div>';
  }

  function renderNotes(notes) {
    if (!notes) return '<span style="color:var(--text-muted);font-size:12px;">—</span>';
    // notes may contain <code> tags — we allow them through (data is trusted)
    // SECURITY: notes is injected as raw HTML to allow <code> tags.
    // When editing is added, sanitize notes through DOMPurify before rendering.
    return `<details class="notes-details">
      <summary>notes</summary>
      <div class="notes-content">${typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(notes) : notes}</div>
    </details>`;
  }

  function renderSubEntries(subEntries) {
    // s.notes may contain <code> tags — sanitized via DOMPurify, same as renderNotes
    if (!subEntries || subEntries.length === 0) return '';
    const items = subEntries.map(s =>
      `<li class="sub-entry">
        <span class="sub-entry-name">${escHtml(s.id)}</span>
        <span class="sub-entry-notes">${s.notes ? (typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(s.notes) : s.notes) : ''}</span>
      </li>`
    ).join('');
    return `<ul class="sub-entries">${items}</ul>`;
  }

  function renderEntry(entry, sectionId) {
    return `<tr class="entry-row" id="entry-${escHtml(entry.id)}">
      <td>
        <div class="entry-name">${escHtml(entry.name)}</div>
        ${entry.version ? `<div class="entry-version">${escHtml(entry.version)}</div>` : ''}
      </td>
      <td class="links-cell">${renderLinks(entry.links)}</td>
      <td class="notes-cell">${renderNotes(entry.notes)}${renderSubEntries(entry.subEntries)}</td>
      <td style="width:1px;white-space:nowrap">
        <div class="edit-controls" data-entry-id="${escHtml(entry.id)}" data-section-id="${escHtml(sectionId)}">
          <button class="btn-edit" onclick="startEditEntry('${escHtml(sectionId)}', '${escHtml(entry.id)}')">Edit</button>
          <button class="btn-delete" onclick="deleteEntry('${escHtml(sectionId)}', '${escHtml(entry.id)}')">Delete</button>
        </div>
      </td>
    </tr>`;
  }

  function renderSection(section) {
    const entriesHtml = section.entries.map(e => renderEntry(e, section.id)).join('');
    return `
      <section class="stack-section" id="section-${escHtml(section.id)}">
        <div class="section-header">
          <span class="section-order">${section.order}</span>
          <h2 class="section-title">${escHtml(section.title)}</h2>
        </div>
        <table class="entries-table">
          <thead>
            <tr>
              <th style="width:180px">Tool</th>
              <th>Links</th>
              <th>Notes</th>
              <th class="edit-controls" style="width:1px"></th>
            </tr>
          </thead>
          <tbody>${entriesHtml}</tbody>
        </table>
      </section>`;
  }

  /* ---------- Build TOC ---------- */
  const tocList = document.getElementById('toc-list');
  const mobileSelect = document.getElementById('mobile-select');

  sections.forEach(section => {
    // Sidebar TOC item
    const li = document.createElement('li');
    li.className = 'toc-item';
    li.dataset.id = section.id;
    li.innerHTML = `<a href="#section-${escHtml(section.id)}">
      <span class="toc-num">${section.order}</span>
      ${escHtml(section.title)}
    </a>`;
    tocList.appendChild(li);

    // Mobile select option
    const opt = document.createElement('option');
    opt.value = section.id;
    opt.textContent = section.order + '. ' + section.title;
    mobileSelect.appendChild(opt);
  });

  /* ---------- Build main content ---------- */
  const main = document.getElementById('main');
  main.innerHTML = sections.map(renderSection).join('');

  /* ---------- Active TOC highlighting (Intersection Observer) ---------- */
  const sectionEls = Array.from(document.querySelectorAll('.stack-section'));
  const tocLinks = Array.from(document.querySelectorAll('.toc-item a'));
  const tocItemMap = {};
  tocLinks.forEach(a => {
    const id = a.getAttribute('href').replace('#section-', '');
    tocItemMap[id] = a;
  });

  let activeId = null;

  const io = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id.replace('section-', '');
        if (id !== activeId) {
          if (activeId && tocItemMap[activeId]) tocItemMap[activeId].classList.remove('active');
          activeId = id;
          if (tocItemMap[id]) tocItemMap[id].classList.add('active');
        }
      }
    });
  }, {
    rootMargin: '-10% 0px -60% 0px',
    threshold: 0
  });

  window._stackObserver = io;
  sectionEls.forEach(el => io.observe(el));

  /* ---------- Init auth ---------- */
  initAuth();

})();
</script>

<!-- =============================================
     EDIT / COMMIT SCRIPT
============================================= -->
<script>
/* ---------- Helpers ---------- */
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function getCurrentData() {
  return JSON.parse(document.getElementById('stack-data').textContent);
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.textContent = msg;
  toast.style.cssText = 'position:fixed;bottom:80px;right:24px;background:#24292f;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:2000;opacity:0;transition:opacity 0.3s';
  document.body.appendChild(toast);
  setTimeout(() => toast.style.opacity = '1', 10);
  setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
}

/* ---------- Link field ---------- */
function addLinkField(label, url) {
  label = label || '';
  url = url || '';
  const container = document.getElementById('modal-links-container');
  const row = document.createElement('div');
  row.style.cssText = 'display:flex;gap:8px;margin-bottom:8px';
  row.innerHTML =
    '<input type="text" placeholder="Label" value="' + escHtml(label) + '" style="flex:1;padding:8px;border:1px solid #d0d7de;border-radius:6px;font-size:13px">' +
    '<input type="text" placeholder="https://..." value="' + escHtml(url) + '" style="flex:2;padding:8px;border:1px solid #d0d7de;border-radius:6px;font-size:13px">' +
    '<button type="button" onclick="this.parentElement.remove()" style="padding:4px 8px;border:1px solid #d0d7de;border-radius:6px;background:#f6f8fa;cursor:pointer">&#x2715;</button>';
  container.appendChild(row);
}

/* ---------- Modal state ---------- */
var _editingEntry = null; // { sectionId, entryId } when editing, null when adding

function openAddModal() {
  _editingEntry = null;
  document.getElementById('modal-title').textContent = 'Add Entry';
  document.getElementById('modal-name').value = '';
  document.getElementById('modal-version').value = '';
  document.getElementById('modal-notes').value = '';
  document.getElementById('modal-links-container').innerHTML = '';
  addLinkField();
  var data = getCurrentData();
  var select = document.getElementById('modal-section');
  select.innerHTML = data.sections.map(function(s) {
    return '<option value="' + escHtml(s.id) + '">' + escHtml(s.title) + '</option>';
  }).join('');
  document.getElementById('entry-modal').style.display = 'flex';
  setTimeout(function() { document.getElementById('modal-section').focus(); }, 0);
}

function startEditEntry(sectionId, entryId) {
  var data = getCurrentData();
  var section = data.sections.find(function(s) { return s.id === sectionId; });
  var entry = section && section.entries.find(function(e) { return e.id === entryId; });
  if (!entry) return;
  _editingEntry = { sectionId: sectionId, entryId: entryId };
  document.getElementById('modal-title').textContent = 'Edit Entry';
  document.getElementById('modal-name').value = entry.name;
  document.getElementById('modal-version').value = entry.version || '';
  document.getElementById('modal-notes').value = entry.notes || '';
  document.getElementById('modal-links-container').innerHTML = '';
  (entry.links || []).forEach(function(l) { addLinkField(l.label, l.url); });
  var select = document.getElementById('modal-section');
  select.innerHTML = data.sections.map(function(s) {
    return '<option value="' + escHtml(s.id) + '">' + escHtml(s.title) + '</option>';
  }).join('');
  select.value = sectionId;
  document.getElementById('entry-modal').style.display = 'flex';
  setTimeout(function() { document.getElementById('modal-section').focus(); }, 0);
}

function closeModal() {
  document.getElementById('entry-modal').style.display = 'none';
  _editingEntry = null;
}

/* ---------- Save entry ---------- */
async function saveEntry() {
  var name = document.getElementById('modal-name').value.trim();
  if (!name) { alert('Name is required'); return; }

  var sectionId = document.getElementById('modal-section').value;
  var version = document.getElementById('modal-version').value.trim();
  var notes = document.getElementById('modal-notes').value.trim();

  var linkRows = document.getElementById('modal-links-container').querySelectorAll('div');
  var links = [];
  linkRows.forEach(function(row) {
    var inputs = row.querySelectorAll('input');
    var lbl = inputs[0] && inputs[0].value.trim();
    var url = inputs[1] && inputs[1].value.trim();
    if (lbl && url && /^https?:\/\//i.test(url)) links.push({ label: lbl, url: url });
  });

  var data = getCurrentData();
  var section = data.sections.find(function(s) { return s.id === sectionId; });
  if (!section) return;

  var editingSnapshot = _editingEntry;

  if (editingSnapshot) {
    var idx = section.entries.findIndex(function(e) { return e.id === editingSnapshot.entryId; });
    if (idx >= 0) {
      section.entries[idx] = Object.assign({}, section.entries[idx], { name: name, version: version, notes: notes, links: links });
    }
  } else {
    var newId = sectionId + '-' + Date.now();
    section.entries.push({ id: newId, name: name, version: version, notes: notes, links: links });
  }

  data.meta.lastUpdated = new Date().toISOString().slice(0, 10);

  closeModal();
  await commitData(data, editingSnapshot ? 'edit ' + name : 'add ' + name);
}

/* ---------- Delete entry ---------- */
async function deleteEntry(sectionId, entryId) {
  if (!confirm('Delete this entry?')) return;
  var data = getCurrentData();
  var section = data.sections.find(function(s) { return s.id === sectionId; });
  if (!section) return;
  var entry = section.entries.find(function(e) { return e.id === entryId; });
  var entryName = entry ? entry.name : 'entry';
  section.entries = section.entries.filter(function(e) { return e.id !== entryId; });
  data.meta.lastUpdated = new Date().toISOString().slice(0, 10);
  await commitData(data, 'delete ' + entryName);
}

/* ---------- renderAll (re-render after commit) ---------- */
function renderAll(data) {
  // Re-use the render functions defined in the IIFE above
  // We need to reach them — they are redefined here for renderAll's use
  function _escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
  function _renderLinks(links) {
    if (!links || links.length === 0) return '<span style="color:var(--text-muted);font-size:12px;">—</span>';
    return '<div class="link-badges">' +
      links.map(function(l) {
        return '<a class="link-badge" href="' + _escHtml(l.url) + '" target="_blank" rel="noopener">' + _escHtml(l.label) + '</a>';
      }).join('') + '</div>';
  }
  function _renderNotes(notes) {
    if (!notes) return '<span style="color:var(--text-muted);font-size:12px;">—</span>';
    return '<details class="notes-details"><summary>notes</summary><div class="notes-content">' + (typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(notes) : notes) + '</div></details>';
  }
  function _renderSubEntries(subEntries) {
    // s.notes may contain <code> tags — sanitized via DOMPurify, same as renderNotes
    if (!subEntries || subEntries.length === 0) return '';
    var items = subEntries.map(function(s) {
      return '<li class="sub-entry">' +
        '<span class="sub-entry-name">' + _escHtml(s.id) + '</span>' +
        '<span class="sub-entry-notes">' + (s.notes ? (typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(s.notes) : s.notes) : '') + '</span>' +
        '</li>';
    }).join('');
    return '<ul class="sub-entries">' + items + '</ul>';
  }

  function _renderEntry(entry, sectionId) {
    return '<tr class="entry-row" id="entry-' + _escHtml(entry.id) + '">' +
      '<td><div class="entry-name">' + _escHtml(entry.name) + '</div>' +
      (entry.version ? '<div class="entry-version">' + _escHtml(entry.version) + '</div>' : '') +
      '</td>' +
      '<td class="links-cell">' + _renderLinks(entry.links) + '</td>' +
      '<td class="notes-cell">' + _renderNotes(entry.notes) + _renderSubEntries(entry.subEntries) + '</td>' +
      '<td style="width:1px;white-space:nowrap">' +
        '<div class="edit-controls" data-entry-id="' + _escHtml(entry.id) + '" data-section-id="' + _escHtml(sectionId) + '">' +
          '<button class="btn-edit" onclick="startEditEntry(\'' + _escHtml(sectionId) + '\', \'' + _escHtml(entry.id) + '\')">Edit</button>' +
          '<button class="btn-delete" onclick="deleteEntry(\'' + _escHtml(sectionId) + '\', \'' + _escHtml(entry.id) + '\')">Delete</button>' +
        '</div>' +
      '</td>' +
      '</tr>';
  }
  function _renderSection(section) {
    var entriesHtml = section.entries.map(function(e) { return _renderEntry(e, section.id); }).join('');
    return '<section class="stack-section" id="section-' + _escHtml(section.id) + '">' +
      '<div class="section-header">' +
        '<span class="section-order">' + section.order + '</span>' +
        '<h2 class="section-title">' + _escHtml(section.title) + '</h2>' +
        '<div class="edit-controls" style="display:inline-flex;margin-left:12px;vertical-align:middle">' +
          '<button onclick="deleteSection(\'' + _escHtml(section.id) + '\')" style="font-size:11px;padding:2px 8px;border:1px solid #d0d7de;border-radius:4px;background:#fff8f8;color:#cf222e;cursor:pointer">Delete section</button>' +
        '</div>' +
      '</div>' +
      '<table class="entries-table">' +
        '<thead><tr>' +
          '<th style="width:180px">Tool</th>' +
          '<th>Links</th>' +
          '<th>Notes</th>' +
          '<th class="edit-controls" style="width:1px"></th>' +
        '</tr></thead>' +
        '<tbody>' + entriesHtml + '</tbody>' +
      '</table>' +
      '</section>';
  }

  var main = document.getElementById('main');
  main.innerHTML = data.sections.map(_renderSection).join('');

  // Rebuild TOC
  var tocList = document.getElementById('toc-list');
  if (tocList) {
    tocList.innerHTML = '';
    data.sections.forEach(function(section) {
      var li = document.createElement('li');
      li.className = 'toc-item';
      li.dataset.id = section.id;
      li.innerHTML = '<a href="#section-' + _escHtml(section.id) + '"><span class="toc-num">' + section.order + '</span>' + _escHtml(section.title) + '</a>';
      tocList.appendChild(li);
    });
  }
  // Also update mobile select
  var mobileSelect = document.getElementById('mobile-select');
  if (mobileSelect) {
    mobileSelect.innerHTML = '<option value="">— choose section —</option>' + data.sections.map(function(s) {
      return '<option value="' + _escHtml(s.id) + '">' + s.order + '. ' + _escHtml(s.title) + '</option>';
    }).join('');
  }

  var isAuthed = !!window._githubToken;
  document.querySelectorAll('.edit-controls').forEach(function(el) {
    el.style.display = isAuthed ? 'flex' : 'none';
  });

  var dateStr = (data.meta && data.meta.lastUpdated) || '';
  var headerDate = document.getElementById('header-date');
  if (headerDate) headerDate.textContent = 'Updated: ' + dateStr;
  var footerMeta = document.getElementById('footer-meta');
  if (footerMeta) footerMeta.textContent = 'Last updated: ' + dateStr + ' · Maintained by ' + ((data.meta && data.meta.owner) || '');

  if (window._stackObserver) {
    window._stackObserver.disconnect();
    document.querySelectorAll('.stack-section').forEach(function(el) { window._stackObserver.observe(el); });
  }
}

/* ---------- Commit to GitHub ---------- */
async function commitData(data, description) {
  var token = window._githubToken;
  if (!token) { alert('Not authenticated'); return; }

  var saveBtn = document.getElementById('modal-save-btn');
  if (saveBtn) saveBtn.textContent = 'Saving...';

  try {
    // 1. Update the JSON in the script tag
    document.getElementById('stack-data').textContent = JSON.stringify(data, null, 2);

    // 2. Get current file SHA
    var metaRes = await fetch('https://api.github.com/repos/CammanderWi11/ai-supastack/contents/index.html', {
      headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
    });
    var meta = await metaRes.json();
    if (!meta.sha) throw new Error('Could not get file SHA');

    // 3. Serialize full HTML
    var htmlContent = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;

    // 4. Base64 encode
    var encoded = btoa(unescape(encodeURIComponent(htmlContent)));

    // 5. Commit
    var commitRes = await fetch('https://api.github.com/repos/CammanderWi11/ai-supastack/contents/index.html', {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + token,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github.v3+json'
      },
      body: JSON.stringify({
        message: 'Update AI stack: ' + description,
        content: encoded,
        sha: meta.sha
      })
    });

    var result = await commitRes.json();
    if (!commitRes.ok) throw new Error(result.message || 'Commit failed');

    // 6. Re-render
    renderAll(data);
    showToast('Saved! GitHub Pages will update in ~30s.');
  } catch (err) {
    alert('Save failed: ' + err.message);
  } finally {
    if (saveBtn) saveBtn.textContent = 'Save';
  }
}

/* ---------- Add Section modal ---------- */
function openAddSectionModal() {
  document.getElementById('section-title-input').value = '';
  document.getElementById('section-modal').style.display = 'flex';
  setTimeout(function() { document.getElementById('section-title-input').focus(); }, 0);
}

function closeSectionModal() {
  document.getElementById('section-modal').style.display = 'none';
}

async function saveSection() {
  var title = document.getElementById('section-title-input').value.trim();
  if (!title) { alert('Title is required'); return; }
  var data = getCurrentData();
  var maxOrder = Math.max(0, ...data.sections.map(function(s) { return s.order; }));
  var id = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  var uniqueId = data.sections.some(function(s) { return s.id === id; }) ? id + '-' + Date.now() : id;
  data.sections.push({ id: uniqueId, title: title, order: maxOrder + 1, entries: [] });
  data.meta.lastUpdated = new Date().toISOString().slice(0, 10);
  closeSectionModal();
  await commitData(data, 'add section ' + title);
}

/* ---------- Delete Section ---------- */
async function deleteSection(sectionId) {
  var data = getCurrentData();
  var section = data.sections.find(function(s) { return s.id === sectionId; });
  if (!section) return;
  if (section.entries.length > 0) {
    if (!confirm('Delete section "' + section.title + '" and all ' + section.entries.length + ' entries in it?')) return;
  } else {
    if (!confirm('Delete empty section "' + section.title + '"?')) return;
  }
  data.sections = data.sections.filter(function(s) { return s.id !== sectionId; });
  data.meta.lastUpdated = new Date().toISOString().slice(0, 10);
  await commitData(data, 'delete section ' + section.title);
}

/* ---------- Close modal on backdrop click ---------- */
document.getElementById('entry-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('section-modal').addEventListener('click', function(e) {
  if (e.target === this) closeSectionModal();
});

/* ---------- Close modal on Escape key ---------- */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (document.getElementById('entry-modal').style.display !== 'none') closeModal();
    if (document.getElementById('section-modal').style.display !== 'none') closeSectionModal();
  }
});
</script>
